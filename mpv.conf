# UI
osc=no
title-bar=no
osd-bar=no

# Rendering
vo=gpu-next
gpu-api=d3d11
gpu-context=d3d11
profile=high-quality
hwdec=auto-safe

# HDR / color signaling
# Lets mpv/Windows use SDR for SDR and HDR metadata when the display path supports it.
target-colorspace-hint=auto
target-colorspace-hint-mode=target

# Practical defaults
save-position-on-quit=yes
keep-open=yes
screenshot-format=png
screenshot-directory=~~desktop/
watch-later-options-remove=sub-pos
